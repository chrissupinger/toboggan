---

name: Static Analysis

on:
    push:
        branches:
        - '**'
    pull_request:
        branches:
        - '**'
    schedule:
        - cron: '0 1 * * 0'

jobs:
    setup:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'
                cache: 'pip'
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install vermin bandit

    vermin:
        needs: setup
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'
                cache: 'pip'
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install vermin
            - name: Run Vermin
              run: vermin --vv --eval-annotations --min 3.9 --max 3.14 toboggan/
    
    bandit:
        needs: setup
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'
                cache: 'pip'
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install bandit
            - name: Run Bandit
              run: bandit -r toboggan/ --format txt -o bandit-report.txt
              continue-on-error: true
            - name: Upload Bandit Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: bandit-report
                path: bandit-report.txt
                retention-days: 7
